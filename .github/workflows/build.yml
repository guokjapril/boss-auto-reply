name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Firefox
        run: |
          python -m playwright install firefox

      - name: Build EXE
        run: python build.py

      - name: Bundle Firefox with EXE
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\AppData\Local\ms-playwright"
          if (Test-Path $cacheDir) {
            Copy-Item -Recurse $cacheDir "dist\ms-playwright"
          }
          # build.py 已生成 run.bat 和 config.yaml 到 dist/
          Compress-Archive -Path "dist\*" -DestinationPath "dist\BossAutoReply-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossAutoReply-Windows
          path: dist/BossAutoReply-Windows.zip
