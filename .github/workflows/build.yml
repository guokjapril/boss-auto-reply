name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          # 记录 chromium 安装路径方便后续打包
          python -c "import playwright.sync_api; p = playwright.sync_api.sync_playwright().start(); print(p.chromium.executable_path); p.stop()"

      - name: Build EXE
        run: python build.py

      - name: Bundle Chromium with EXE
        shell: pwsh
        run: |
          $cacheDir = "$env:USERPROFILE\AppData\Local\ms-playwright"
          if (Test-Path $cacheDir) {
            Copy-Item -Recurse $cacheDir "dist\ms-playwright"
          }
          Compress-Archive -Path "dist\BossAutoReply.exe", "dist\ms-playwright" -DestinationPath "dist\BossAutoReply-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BossAutoReply-Windows
          path: dist/BossAutoReply-Windows.zip
