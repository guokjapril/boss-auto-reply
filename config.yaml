# BOSS直聘自动复聊脚本 — 配置文件

browser:
  headless: false               # 首次扫码建议 false，后续可改为 true
  user_data_dir: "./data/browser_state"
  viewport:
    width: 1280
    height: 800
  locale: "zh-CN"
  timezone_id: "Asia/Shanghai"

monitor:
  poll_interval: 10             # 轮询间隔（秒）
  max_pages: 5                  # 最大翻页数
  chat_list_url: "https://www.zhipin.com/web/chat/index"

reply:
  mode: "template"              # "template" | "ai"
  rate_limit_per_hour: 50       # 每小时最大回复数，超过则暂停
  min_delay: 1.0                # 最小操作延迟（秒）
  max_delay: 3.0                # 最大操作延迟（秒）
  default_reply: "您好，看到了您的消息，方便的话可以进一步沟通～"

  # 系统消息过滤 - 包含以下关键字的不会触发回复
  ignore_keywords:
    - "竞争者PK"
    - "简历被查看"
    - "对你感兴趣"
    - "沟通过"
    - "聊天消息Top"
    - "投递成功"
    - "Boss直聘"
    - "系统通知"
    - "回复TD退订"

  templates:
    # ===== 最高优先级：候选人已发简历（别人发了简历不能还叫人发） =====
    - keywords: ["简历发了", "这是我的简历", "简历发你", "发你了", "简历已发", "附件简历", "简历在附件", "请查收"]
      reply: "收到，我先看下您的简历，合适的话尽快联系您～"

    # ===== 负面情绪 / 婉拒（需安抚） =====
    - keywords: ["不想加班", "不接受加班", "加班太多", "加班太狠", "加班受不了", "天天加班"]
      negative: true
      reply: "理解您对加班的顾虑，我们正常双休，项目紧急时才有加班但都有补贴。方便的话先发简历，面试时详细聊～"

    - keywords: ["工资太低", "薪资太低", "薪资不高", "钱太少", "给太少", "待遇太差", "压工资"]
      negative: true
      reply: "理解，薪资要和能力匹配。您方便先发一份简历，我们根据经验定薪，不合适也没关系～"

    - keywords: ["太远了", "通勤太久", "通勤太长", "交通不便", "距离太远", "太偏僻"]
      negative: true
      reply: "理解，通勤确实要考虑。我们交通还算便利，您可以先发简历看看岗位匹配度，合适的话都好商量～"

    - keywords: ["已入职", "找到了", "已经入职", "找到工作", "已上班", "已经上班"]
      negative: true
      reply: "恭喜找到新工作！祝您职场顺利，以后有机会再合作～"

    - keywords: ["不合适", "不想去", "暂时不看", "算了吧", "免了", "不用了", "不考虑了", "不找了"]
      negative: true
      reply: "好的，没关系，祝您找到满意的工作，以后有机会再合作～"

    # ===== 候选人问公司和岗位基本信息 =====
    - keywords: ["什么公司", "哪家公司", "你们公司", "公司名字", "公司名称", "公司叫", "贵公司"]
      reply: "我们是做技术研发的科技公司，具体公司和岗位信息在JD里有详细说明，您感兴趣的话可以先发一份简历过来～"

    - keywords: ["什么岗位", "哪个岗位", "具体岗位", "招什么", "有什么岗位", "什么职位"]
      reply: "目前有多个技术岗位在招，具体JD里有详细说明。您方便先发一份简历过来，我根据您的经验匹配最合适的岗位～"

    - keywords: ["什么要求", "有什么要求", "门槛高吗", "要求高吗", "难不难", "好不好进"]
      reply: "具体要求在JD里有写。我们看重实际能力多于学历背景，您有兴趣的话发份简历过来，符合条件的话很快能安排面试～"

    # ===== 候选人问福利待遇 =====
    - keywords: ["五险一金", "公积金", "社保", "年终奖", "福利待遇", "公司福利", "有什么福利", "交保险"]
      reply: "五险一金+年终奖都有，福利齐全。具体细节面试时详聊，您先发简历过来吧～"

    - keywords: ["薪资范围", "薪资待遇", "期望薪资", "能给多少", "大约多少", "大概多少", "薪资多少"]
      reply: "薪资根据经验和能力面议，JD里有范围参考。您方便先发一份简历过来，我们根据情况定薪～"

    - keywords: ["加班费", "加班补贴", "加班工资", "双休", "大小周", "单休", "996", "工作制"]
      reply: "我们正常双休，偶尔项目紧急有加班但都有补贴。更具体的面试聊，您先发简历过来吧～"

    - keywords: ["出差", "外派", "驻场", "长期出差", "去外地"]
      reply: "出差情况看具体项目和岗位，JD里有说明。您方便先发简历，面试时详细沟通～"

    - keywords: ["薪资", "待遇", "工资", "薪水", "月薪", "年薪", "多少钱"]
      reply: "薪资根据经验和能力面议，JD里有参考范围。您方便的话可以先发简历过来，我们进一步沟通～"

    # ===== 候选人问办公信息 =====
    - keywords: ["办公地点", "公司地址", "地址在哪", "公司在哪", "位置在哪", "在哪里", "哪个区"]
      reply: "公司位置交通便利靠近地铁站，具体地址面试邀请里会写明。您方便先发一份简历过来吗？"

    - keywords: ["通勤", "远不远", "方便吗", "怎么过去", "停车"]
      reply: "公司靠近地铁站，通勤还算方便。具体地址面试时会发你，先发简历看看匹配度吧～"

    # ===== 候选人表达意向/推进流程 =====
    - keywords: ["简历发", "怎么发", "怎么投", "怎么申请", "投递方式", "投简历", "提交简历"]
      reply: "您直接在BOSS直聘把简历发过来就行，我收到后会尽快查看并回复～"

    - keywords: ["面试", "面聊", "约面", "电话", "视频", "什么时候方便", "约个时间", "聊一下", "聊聊"]
      reply: "好的，您看什么时间方便？我们可以安排电话或视频面试，您提前发一份简历过来会更高效～"

    - keywords: ["感兴趣", "想了解", "想试试", "想投", "投递", "投一下", "想看看", "了解一下"]
      reply: "好的，欢迎了解～您直接通过BOSS直聘发一份简历过来，我收到后尽快回复。"

    # ===== 候选人确认状态 =====
    - keywords: ["还招", "还在吗", "还在招吗", "还在招人", "有坑吗", "招到人", "招满", "停止招聘"]
      reply: "是的，岗位还在招聘中，您感兴趣的话发一份简历过来，我们尽快安排面试～"

    - keywords: ["岗位要求", "具体要求", "岗位职责", "硬性要求", "JD", "工作内容", "做什么的", "干嘛的"]
      reply: "具体要求和加分项在JD里有写。您有兴趣可以先发简历过来，符合条件的话尽快安排面试～"

    - keywords: ["学历", "经验", "工作年限", "年龄", "资格"]
      reply: "JD里有详细任职要求，我们整体对能力比学历更看重。符合条件发简历过来即可～"

    # ===== 候选人礼貌结束/犹豫 =====
    - keywords: ["考虑一下", "想想看", "回头再说", "再联系", "保持联系", "看看再说", "再想想"]
      reply: "好的，您慢慢考虑，有什么问题随时问我。期待您的简历～"

    - keywords: ["谢谢", "感谢", "收到", "明白", "清楚了"]
      reply: "不客气，有什么问题随时沟通，期待您的简历～"

    # ===== 通用招呼（放在最后，避免短词抢分） =====
    - keywords: ["你好", "您好", "打扰一下", "打扰了", "请问", "问下", "想问", "咨询"]
      reply: "您好！感谢关注，方便发一份您的简历吗？"

    - keywords: ["在吗", "还在不", "在不在", "hi", "hello", "Hi", "Hello", "哈喽", "嗨"]
      reply: "在的！您好，感谢关注，方便发一份您的简历看看吗？"

    - keywords: ["好的", "ok", "OK", "嗯", "好滴"]
      reply: "好的，有什么问题随时问我，期待您的简历～"

ai:
  provider: "openai"            # "openai" | "claude" | "custom"
  api_key: ""                   # 填写你的 API key
  base_url: ""                  # 可选，兼容 OpenAI 的自定义 endpoint
  model: "gpt-4o-mini"          # 模型名称，也可用 deepseek-chat / qwen-turbo
  max_tokens: 200
  temperature: 0.7
  timeout: 15                   # 请求超时（秒）
  context: |
    你是一个专业的招聘HR，正在BOSS直聘上与候选人沟通。
    当前与你对话的候选人叫{name}，他说："{message}"

    你的回复要求：
    1. 简短自然，像真人HR一样说话，不超过80字
    2. 用口语化中文，偶尔用"～"结尾显得亲切
    3. 核心目标：引导候选人发简历或推进面试流程
    4. 如果候选人问薪资，回复面议并引导发简历
    5. 如果候选人说不想加班/嫌远/嫌工资低，先表示理解再接正面信息
    6. 如果候选人说找到了/不考虑了，礼貌祝福后结束
    7. 如果候选人只打招呼，友好回应并引导发简历

logging:
  level: "INFO"                 # DEBUG | INFO | WARNING | ERROR
  file: "./data/bot.log"
  max_bytes: 10485760           # 10MB 轮转
  backup_count: 3
